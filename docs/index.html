<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DubiCars Monitor — Dashboard</title>
<style>
  :root {
    --ground: #f6f7f9; --surface: #ffffff; --ink: #16202a; --muted: #5b6672;
    --faint: #8a95a1; --hair: #e4e8ec; --accent: #0e7490; --accent-soft: #e2f1f4;
    --pass: #1a7f4b; --pass-soft: #e5f3ec; --slow: #c07a00; --slow-soft: #fbf0da;
    --fail: #c02626; --fail-soft: #fbe6e6; --skip: #7a8590; --skip-soft: #eef0f2;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--ground); color: var(--ink); font-family: var(--sans); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 940px; margin: 0 auto; padding: 40px 24px 72px; }

  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin: 0 0 10px; }
  h1 { font-size: clamp(28px, 5vw, 40px); line-height: 1.1; letter-spacing: -0.02em; margin: 0 0 8px; text-wrap: balance; }
  .sub { color: var(--muted); font-size: 15px; margin: 0; max-width: 62ch; }

  /* controls */
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin: 24px 0 6px; }
  .controls label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); }
  select { font-family: var(--mono); font-size: 13px; color: var(--ink); background: var(--surface); border: 1px solid var(--hair); border-radius: 8px; padding: 8px 12px; min-width: 220px; cursor: pointer; }
  select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .navbtn { font-family: var(--mono); font-size: 14px; background: var(--surface); border: 1px solid var(--hair); border-radius: 8px; width: 34px; height: 34px; cursor: pointer; color: var(--ink); }
  .navbtn:hover { border-color: var(--accent); color: var(--accent); }
  .navbtn:disabled { opacity: 0.4; cursor: default; }
  .gen { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--faint); }

  /* history strip */
  .history { display: flex; gap: 2px; margin: 10px 0 4px; height: 30px; align-items: stretch; }
  .tick { flex: 1 1 0; min-width: 3px; border-radius: 2px; cursor: pointer; opacity: 0.55; transition: opacity .12s; }
  .tick:hover { opacity: 0.85; }
  .tick.active { opacity: 1; outline: 2px solid var(--ink); outline-offset: 1px; }
  .tick.pass { background: var(--pass); } .tick.slow { background: var(--slow); }
  .tick.fail { background: var(--fail); } .tick.skip { background: var(--skip); }
  .history-cap { font-family: var(--mono); font-size: 11px; color: var(--faint); margin: 0 0 22px; display: flex; justify-content: space-between; }

  .banner { margin: 20px 0 8px; border: 1px solid var(--hair); border-left: 4px solid var(--slow); background: var(--surface); border-radius: 10px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .banner.ok { border-left-color: var(--pass); } .banner.warn { border-left-color: var(--slow); } .banner.crit { border-left-color: var(--fail); }
  .banner .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  .banner.ok .dot { background: var(--pass); box-shadow: 0 0 0 4px var(--pass-soft); }
  .banner.warn .dot { background: var(--slow); box-shadow: 0 0 0 4px var(--slow-soft); }
  .banner.crit .dot { background: var(--fail); box-shadow: 0 0 0 4px var(--fail-soft); }
  .banner .txt { font-size: 15px; } .banner .txt span { color: var(--muted); }

  section { margin-top: 36px; }
  h2 { font-size: 13px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--faint); margin: 0 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--hair); }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .stat { background: var(--surface); border: 1px solid var(--hair); border-radius: 10px; padding: 14px 16px; }
  .stat .n { font-family: var(--mono); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .stat.pass .n { color: var(--pass); } .stat.slow .n { color: var(--slow); } .stat.fail .n { color: var(--fail); }

  .pill { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.03em; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  .pill.pass { background: var(--pass-soft); color: var(--pass); } .pill.slow { background: var(--slow-soft); color: var(--slow); }
  .pill.fail { background: var(--fail-soft); color: var(--fail); } .pill.skip { background: var(--skip-soft); color: var(--skip); }

  .tablecard { background: var(--surface); border: 1px solid var(--hair); border-radius: 12px; overflow: hidden; }
  .scroll { overflow-x: auto; }
  table { border-collapse: collapse; width: 100%; min-width: 640px; }
  th, td { text-align: left; padding: 11px 16px; border-bottom: 1px solid var(--hair); font-size: 13.5px; vertical-align: middle; }
  thead th { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); font-weight: 600; background: #fafbfc; }
  tbody tr:last-child td { border-bottom: none; }
  .name { font-weight: 600; } .q { font-family: var(--mono); color: var(--muted); font-size: 12px; }
  td.num { font-family: var(--mono); font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; }
  .note { font-size: 11.5px; color: var(--faint); font-family: var(--mono); }

  .gauge { position: relative; width: 120px; height: 8px; background: #eef1f3; border-radius: 999px; overflow: hidden; display: inline-block; vertical-align: middle; }
  .gauge .fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 999px; }
  .gauge .fill.pass { background: var(--pass); } .gauge .fill.slow { background: var(--slow); } .gauge .fill.fail { background: var(--fail); }
  .thresh { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--ink); opacity: 0.55; }
  .cap { font-family: var(--mono); font-size: 11px; color: var(--faint); white-space: nowrap; margin-left: 8px; }

  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .step { background: var(--surface); border: 1px solid var(--hair); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .step .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .step .step-n { font-family: var(--mono); font-size: 11px; color: var(--faint); letter-spacing: 0.05em; }
  .step .title { font-weight: 650; font-size: 15px; margin: 0; }
  .step .time { font-family: var(--mono); font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .step .time small { font-size: 14px; color: var(--muted); font-weight: 400; }
  .step .desc { font-size: 12.5px; color: var(--muted); }
  .step .gauge { width: 100%; }

  .findings { display: flex; flex-direction: column; gap: 12px; }
  .finding { background: var(--surface); border: 1px solid var(--hair); border-radius: 12px; padding: 16px 18px; display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; }
  .finding .sev { grid-row: span 2; width: 8px; align-self: stretch; border-radius: 4px; }
  .finding.crit .sev { background: var(--fail); } .finding.warn .sev { background: var(--slow); } .finding.info .sev { background: var(--accent); }
  .finding h3 { margin: 0; font-size: 15px; } .finding p { margin: 2px 0 0; font-size: 13.5px; color: var(--muted); }
  .finding code { font-family: var(--mono); font-size: 12px; background: #f1f3f5; padding: 1px 5px; border-radius: 4px; color: var(--ink); word-break: break-all; }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel { background: var(--surface); border: 1px solid var(--hair); border-radius: 12px; padding: 18px 20px; }
  .panel h3 { margin: 0 0 12px; font-size: 15px; }
  .panel ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 9px; }
  .panel li { font-size: 13.5px; display: flex; gap: 9px; align-items: baseline; }
  .panel li .k { font-family: var(--mono); font-size: 11px; color: var(--accent); flex: none; width: 74px; }
  .panel li .v { color: var(--muted); }
  .panel.next li::before { content: "→"; color: var(--accent); font-family: var(--mono); flex: none; }
  .panel.next .v { color: var(--ink); }

  footer { margin-top: 48px; padding-top: 20px; border-top: 1px solid var(--hair); font-family: var(--mono); font-size: 12px; color: var(--faint); display: flex; flex-wrap: wrap; gap: 6px 20px; justify-content: space-between; }

  .empty { background: var(--surface); border: 1px dashed var(--hair); border-radius: 12px; padding: 48px; text-align: center; color: var(--muted); }

  @media (max-width: 720px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .steps { grid-template-columns: 1fr; }
    .cols { grid-template-columns: 1fr; }
    .gauge { width: 90px; }
    .gen { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Synthetic Monitoring · Live Dashboard</p>
    <h1>DubiCars Monitor</h1>
    <p class="sub">Automated hourly health &amp; performance checks of DubiCars' core APIs and the primary buyer journey. Pick any hour below to view that run.</p>
  </header>

  <div class="controls">
    <label for="runSelect">Run</label>
    <button class="navbtn" id="prevBtn" title="Newer">&#8249;</button>
    <select id="runSelect" aria-label="Select run"></select>
    <button class="navbtn" id="nextBtn" title="Older">&#8250;</button>
    <span class="gen" id="gen"></span>
  </div>

  <div class="history" id="history"></div>
  <div class="history-cap"><span id="histStart"></span><span>last 7 days · newest →</span></div>

  <div id="content"></div>

  <footer>
    <span>DubiCars Monitor · Node + Playwright · logs to Google Sheets</span>
    <span id="footGen"></span>
  </footer>
</div>

<script>
  const RUNS = [];          // newest-first
  const GENERATED = "2026-07-23T04:59:54.848Z";

  const clsOf = (r) => ({ PASS: 'pass', SLOW: 'slow', FAIL: 'fail', SKIPPED: 'skip' }[r] || 'skip');
  const fmt = (ts) => { const d = new Date(ts); return isNaN(d) ? ts : d.toISOString().slice(0, 16).replace('T', ' ') + ' UTC'; };
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  function gauge(value, threshold, scaleMax, result) {
    if (value === '' || value == null || isNaN(+value)) return '<span class="cap">—</span>';
    const w = Math.min(100, (+value / scaleMax) * 100);
    const tick = Math.min(100, (threshold / scaleMax) * 100);
    return '<span class="gauge"><span class="fill ' + clsOf(result) + '" style="width:' + w.toFixed(1) + '%"></span><span class="thresh" style="left:' + tick.toFixed(1) + '%"></span></span>';
  }

  const STEP_TITLES = { land: 'Land on homepage', search: 'Search', open_ad: 'Open an ad' };

  function render(i) {
    const run = RUNS[i];
    if (!run) return;
    document.getElementById('runSelect').value = i;
    document.getElementById('prevBtn').disabled = i <= 0;
    document.getElementById('nextBtn').disabled = i >= RUNS.length - 1;
    [...document.querySelectorAll('.tick')].forEach((t) => t.classList.toggle('active', +t.dataset.i === i));

    const s = run.summary || {};
    const apiBar = (run.thresholds && run.thresholds.apiMs) || 600;
    const pageBar = (run.thresholds && run.thresholds.pageMs) || 4000;
    const state = s.fail > 0 ? 'crit' : s.slow > 0 ? 'warn' : 'ok';
    const bannerText = s.fail > 0
      ? '<strong>' + s.fail + ' failed check(s).</strong> <span>Needs attention.</span>'
      : s.slow > 0
        ? '<strong>Operational, with ' + s.slow + ' slow check(s).</strong> <span>No errors; some response times crossed their thresholds.</span>'
        : '<strong>All healthy.</strong> <span>Every check passed within thresholds.</span>';

    // API table
    const apiRows = (run.api || []).map((r) => {
      const cached = /cache\?/.test(r.detail || '');
      const t = r.response_time_ms;
      return '<tr>'
        + '<td class="name">' + esc(r.endpoint) + '</td>'
        + '<td class="q">' + (r.query ? esc(r.query) : '—') + '</td>'
        + '<td class="num">' + esc(r.http_status) + '</td>'
        + '<td class="num">' + (t === '' || t == null ? '—' : esc(t) + ' ms') + '</td>'
        + '<td>' + gauge(t, apiBar, apiBar * 1.667, r.result) + (cached ? '<span class="cap">cached</span>' : '') + '</td>'
        + '<td><span class="pill ' + clsOf(r.result) + '">' + esc(r.result) + '</span></td>'
        + '</tr>';
    }).join('');

    // Journey cards
    const journey = (run.journey || []).map((r, idx) => {
      const t = r.load_time_ms;
      return '<div class="step">'
        + '<div class="top"><span class="step-n">STEP ' + (idx + 1) + '</span><span class="pill ' + clsOf(r.result) + '">' + esc(r.result) + '</span></div>'
        + '<p class="title">' + esc(STEP_TITLES[r.step] || r.step) + '</p>'
        + '<div class="time" style="color:var(--' + clsOf(r.result) + ')">' + (t === '' || t == null ? '—' : esc(t) + '<small> ms</small>') + '</div>'
        + gauge(t, pageBar, pageBar * 1.25, r.result)
        + '<div class="desc">' + esc(r.detail || '') + '</div>'
        + '</div>';
    }).join('');

    // Findings: dynamic (slow/fail) + persistent known issues
    const dyn = [...(run.api || []).map((r) => ({ ...r, kind: 'API ' + r.endpoint + (r.query ? ' (' + r.query + ')' : ''), val: r.response_time_ms })),
                 ...(run.journey || []).map((r) => ({ ...r, kind: 'Page: ' + (STEP_TITLES[r.step] || r.step), val: r.load_time_ms }))]
      .filter((r) => r.result === 'SLOW' || r.result === 'FAIL')
      .map((r) => '<div class="finding ' + (r.result === 'FAIL' ? 'crit' : 'warn') + '"><div class="sev"></div>'
        + '<h3>' + esc(r.kind) + ' — ' + esc(r.result) + '</h3><p>' + esc(r.detail || '') + '</p></div>').join('');

    const known = ''
      + '<div class="finding info"><div class="sev"></div><h3>Font blocked by CORS (known, suppressed)</h3>'
      + '<p><code>assets.dubicars.com/…/tajawal/medium.woff2</code> returns 200 but lacks an <code>Access-Control-Allow-Origin</code> header, so browsers reject it. Fix at the CDN.</p></div>'
      + '<div class="finding info"><div class="sev"></div><h3>Suggestions API is CDN-cached</h3>'
      + '<p>CloudFront serves suggestions from cache and ignores client cache-busting, so those timings reflect the CDN, not the origin. Cached responses are flagged in the log detail.</p></div>';

    // Network errors
    const net = (run.netErrors || []).length
      ? '<div class="tablecard scroll"><table><thead><tr><th>Page</th><th>Request URL</th><th>Status</th><th>Detail</th></tr></thead><tbody>'
        + run.netErrors.map((n) => '<tr><td class="name">' + esc(n.page) + '</td><td class="q">' + esc(n.request_url) + '</td><td class="num">' + esc(n.status) + '</td><td class="note">' + esc(n.detail) + '</td></tr>').join('')
        + '</tbody></table></div>'
      : '<p class="note">No first-party network request failures this run.</p>';

    document.getElementById('content').innerHTML = ''
      + '<div class="banner ' + state + '"><span class="dot"></span><span class="txt">' + bannerText
        + ' <span>· Run ' + fmt(run.timestamp) + '</span></span></div>'
      + '<section><h2>At a glance</h2><div class="stats">'
        + statCard('', s.total, 'Checks') + statCard('pass', s.pass, 'Passed') + statCard('slow', s.slow, 'Slow')
        + statCard('fail', s.fail, 'Failed') + statCard('', s.netErrors, 'Network errors')
      + '</div></section>'
      + '<section><h2>API checks — vs ' + apiBar + ' ms bar</h2><div class="tablecard scroll"><table>'
        + '<thead><tr><th>Endpoint</th><th>Query</th><th>Status</th><th class="num">Time</th><th>vs threshold</th><th>Result</th></tr></thead>'
        + '<tbody>' + apiRows + '</tbody></table></div>'
        + '<p class="note" style="margin-top:10px">Vertical tick = ' + apiBar + ' ms bar. “cached” = served from CloudFront (timing reflects the CDN).</p></section>'
      + '<section><h2>Buyer journey — vs ' + pageBar + ' ms bar</h2><div class="steps">' + journey + '</div></section>'
      + '<section><h2>Findings</h2><div class="findings">' + (dyn || '') + known + '</div></section>'
      + '<section><h2>Network requests</h2>' + net + '</section>'
      + '<section><h2>Scope</h2><div class="cols">'
        + '<div class="panel"><h3>What\'s monitored</h3><ul>'
          + '<li><span class="k">APIs</span><span class="v">search, homepage, suggestions (typed t→toyota), items (chained)</span></li>'
          + '<li><span class="k">Journey</span><span class="v">homepage → typed search → open ad (headless Chromium)</span></li>'
          + '<li><span class="k">Per page</span><span class="v">load time + first-party network requests + console errors</span></li>'
          + '<li><span class="k">Logging</span><span class="v">Google Sheets + this hourly dashboard</span></li>'
        + '</ul></div>'
        + '<div class="panel next"><h3>Next iteration</h3><ul>'
          + '<li><span class="v">Google Chat alerts on FAIL / SLOW</span></li>'
          + '<li><span class="v">Tune the ' + pageBar + ' ms page bar from baseline data</span></li>'
        + '</ul></div>'
      + '</div></section>';
  }

  function statCard(cls, n, label) {
    return '<div class="stat ' + cls + '"><div class="n">' + (n == null ? '—' : n) + '</div><div class="l">' + label + '</div></div>';
  }

  function boot() {
    document.getElementById('gen').textContent = 'updated ' + fmt(GENERATED);
    document.getElementById('footGen').textContent = 'Generated ' + fmt(GENERATED);

    if (!RUNS.length) {
      document.getElementById('content').innerHTML = '<div class="empty">No runs recorded yet. The first hourly run will populate this dashboard.</div>';
      return;
    }

    const sel = document.getElementById('runSelect');
    sel.innerHTML = RUNS.map((r, i) => '<option value="' + i + '">' + fmt(r.timestamp) + (i === 0 ? '  (latest)' : '') + '</option>').join('');
    sel.addEventListener('change', () => render(+sel.value));
    document.getElementById('prevBtn').addEventListener('click', () => render(Math.max(0, +sel.value - 1)));
    document.getElementById('nextBtn').addEventListener('click', () => render(Math.min(RUNS.length - 1, +sel.value + 1)));

    // History strip: oldest → newest (left → right)
    const asc = RUNS.map((r, i) => ({ r, i })).reverse();
    document.getElementById('history').innerHTML = asc.map(({ r, i }) => {
      const st = (r.summary && (r.summary.fail > 0 ? 'fail' : r.summary.slow > 0 ? 'slow' : 'pass')) || 'skip';
      return '<div class="tick ' + st + '" data-i="' + i + '" title="' + fmt(r.timestamp) + '"></div>';
    }).join('');
    [...document.querySelectorAll('.tick')].forEach((t) => t.addEventListener('click', () => render(+t.dataset.i)));
    document.getElementById('histStart').textContent = fmt(asc[0].r.timestamp);

    render(0);
  }
  boot();
</script>
</body>
</html>
