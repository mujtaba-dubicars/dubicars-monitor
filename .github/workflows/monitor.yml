name: DubiCars Monitor

on:
  schedule:
    - cron: '17 * * * *' # :17 past every hour (UTC); GitHub schedule is best-effort and often delayed.
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: write

concurrency:
  group: dubicars-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run monitor
        env:
          RUN_OUT_DIR: docs/runs
          SHEETS_WEBAPP_URL: ${{ secrets.SHEETS_WEBAPP_URL }}
          SHEETS_WEBAPP_SECRET: ${{ secrets.SHEETS_WEBAPP_SECRET }}
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
        run: npm start

      - name: Build dashboard (7-day window)
        run: node src/report.js

      - name: Commit run + dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "monitor: run $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          for i in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push; then
                echo "Pushed on attempt $i."
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "Push race on attempt $i; retrying..."
            sleep 4
          done
          echo "Could not push after 5 attempts." >&2
          exit 1
